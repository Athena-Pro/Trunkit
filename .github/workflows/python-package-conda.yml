name: CI and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres-trunkit:
        image: postgres:16
        env:
          POSTGRES_USER: trunk
          POSTGRES_PASSWORD: trunk
          POSTGRES_DB: trunk
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-nerode:
        image: postgres:16
        env:
          POSTGRES_USER: nerode
          POSTGRES_PASSWORD: nerode
          POSTGRES_DB: nerode
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Apply Trunkit schema
        env:
          PGPASSWORD: trunk
        run: |
          # LC_ALL=C sort -n: numeric prefix order (99_ < 100_), matching calx.db.schema_order
          for f in $(ls src/calx/sql/*.sql | LC_ALL=C sort -n); do
            psql -h localhost -p 5434 -U trunk -d trunk -f "$f" -q
          done

      - name: Apply Nerode schema
        env:
          NERODE_DSN: postgresql://nerode:nerode@localhost:5435/nerode
        run: |
          python -c "
          import psycopg
          from nerode.db import apply_schema
          with psycopg.connect('postgresql://nerode:nerode@localhost:5435/nerode') as conn:
              apply_schema(conn, verbose=True)
          "

      - name: Test
        env:
          CALX_TEST_DSN: postgresql://trunk:trunk@localhost:5434/trunk
          NERODE_DSN: postgresql://nerode:nerode@localhost:5435/nerode
        run: pytest -m "not slow and not primesieve and not network"

  windows-smoke:
    # The CLIs ship Unicode marks (âœ“ âœ— â†’) that crash on legacy cp1252 consoles
    # unless stdio is reconfigured; this leg pins that fix and basic CLI health
    # on Windows, where no database is available.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: CLI smoke under cp1252
        shell: pwsh
        env:
          PYTHONIOENCODING: cp1252
          PYTHONUTF8: "0"
        run: |
          trunkit --help
          nerode --help
          python -c "from calx.cli import _utf8_stdio; _utf8_stdio(); print('âœ“ âœ— â†’')"
          trunkit quickstart --compose-only --dir $env:RUNNER_TEMP\qs

      - name: Unit tests (no database â€” DB-backed tests self-skip)
        shell: pwsh
        env:
          PYTHONIOENCODING: cp1252
        run: pytest -m "not slow and not primesieve and not network" -q

  build:
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
