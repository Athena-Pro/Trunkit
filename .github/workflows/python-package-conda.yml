name: CI and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres-trunkit:
        image: postgres:16
        env:
          POSTGRES_USER: trunk
          POSTGRES_PASSWORD: trunk
          POSTGRES_DB: trunk
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-nerode:
        image: postgres:16
        env:
          POSTGRES_USER: nerode
          POSTGRES_PASSWORD: nerode
          POSTGRES_DB: nerode
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Apply schema
        env:
          PGPASSWORD: trunk
        run: |
          for f in src/calx/sql/0[0-7]*.sql; do
            psql -h localhost -p 5434 -U trunk -d trunk -f "$f" -q
          done

      - name: Apply Nerode schema
        env:
          NERODE_DSN: postgresql://nerode:nerode@localhost:5435/nerode
        run: |
          python -c "
          from nerode.db import apply_schema, connect
          with connect() as conn:
              apply_schema(conn, verbose=True)
          "

      - name: Test
        env:
          CALX_TEST_DSN: postgresql://trunk:trunk@localhost:5434/trunk
          NERODE_TEST_DSN: postgresql://nerode:nerode@localhost:5435/nerode
        run: pytest -m "not slow and not primesieve"

  build:
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
