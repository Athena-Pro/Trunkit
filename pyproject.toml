[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "trunkit"
version = "0.1.0"
description = "Trunkit — low-cost proof-carrying code middleware on PostgreSQL"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["postgresql", "proof-carrying-code", "category-theory", "number-theory", "formal-verification"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: SQL",
  "Topic :: Scientific/Engineering :: Mathematics",
  "Topic :: Database",
]
dependencies = [
  "psycopg[binary]>=3.2,<4",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-cov>=5",
  "ruff>=0.6",
  "build>=1.0",
  "twine>=5.0",
]

[project.urls]
Homepage = "https://github.com/Athena-Pro/Trunkit"
Repository = "https://github.com/Athena-Pro/Trunkit"

[project.scripts]
trunkit = "calx.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/calx"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
filterwarnings = ["error"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
